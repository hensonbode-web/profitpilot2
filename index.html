<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfitPilot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0f5;--muted:#7a7a8c;--accent:#6c63ff;--accent2:#a78bfa;--green:#10b981;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrapper{max-width:680px;margin:0 auto;padding:2rem 1.25rem 4rem}
header{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-text h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.logo-text p{font-size:12px;color:var(--muted)}
.badge{margin-left:auto;font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(108,99,255,0.15);color:var(--accent2);border:1px solid rgba(108,99,255,0.25)}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;width:100%}
.field select option{background:#1c1c26}
.field textarea{resize:vertical;min-height:72px}
.expense-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.expense-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:8px 10px;border-radius:8px;border:1px solid var(--border)}
.expense-item input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
.analyze-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#8b7cf8);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;margin-top:0.5rem}
.analyze-btn:disabled{opacity:0.4;cursor:not-allowed}
.loading-wrap{text-align:center;padding:3rem 1rem}
.spinner{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:12px}
.result-card.money{border-left:3px solid var(--red)}
.result-card.wins{border-left:3px solid var(--green)}
.result-card.plan{border-left:3px solid var(--blue)}
.result-card.growth{border-left:3px solid var(--amber)}
.result-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.result-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.result-card.money .result-icon{background:rgba(248,113,113,0.12)}
.result-card.wins .result-icon{background:rgba(16,185,129,0.12)}
.result-card.plan .result-icon{background:rgba(96,165,250,0.12)}
.result-card.growth .result-icon{background:rgba(251,191,36,0.12)}
.result-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.result-body{font-size:13.5px;color:rgba(240,240,245,0.75);line-height:1.7;white-space:pre-wrap}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px}
.reset-wrap{text-align:center;margin-top:1.25rem}
.reset-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline}
.error-box{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);margin-top:12px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L12.9 7.6L19 8.6L14.5 13L15.8 19L10 16L4.2 19L5.5 13L1 8.6L7.1 7.6L10 2Z" fill="white"/></svg>
    </div>
    <div class="logo-text">
      <h1>ProfitPilot</h1>
      <p>AI advisor for small businesses</p>
    </div>
    <span class="badge">Beta</span>
  </header>

  <div id="form-section">
    <div class="section-label">Revenue &amp; customers</div>
    <div class="card">
      <div class="row">
        <div class="field"><label>Monthly revenue ($)</label><input type="number" id="revenue" placeholder="e.g. 15000"></div>
        <div class="field"><label>Monthly expenses ($)</label><input type="number" id="expenses" placeholder="e.g. 9000"></div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="field"><label>New leads per month</label><input type="number" id="leads" placeholder="e.g. 80"></div>
        <div class="field"><label>Paying customers</label><input type="number" id="customers" placeholder="e.g. 20"></div>
      </div>
    </div>
    <div class="section-label">Where you spend money</div>
    <div class="card">
      <div class="expense-grid">
        <label class="expense-item"><input type="checkbox" value="advertising"> Advertising</label>
        <label class="expense-item"><input type="checkbox" value="employees"> Employees</label>
        <label class="expense-item"><input type="checkbox" value="software"> Software / tools</label>
        <label class="expense-item"><input type="checkbox" value="rent"> Rent</label>
        <label class="expense-item"><input type="checkbox" value="inventory"> Inventory</label>
        <label class="expense-item"><input type="checkbox" value="contractors"> Contractors</label>
      </div>
    </div>
    <div class="section-label">Business context</div>
    <div class="card">
      <div class="field">
        <label>Industry</label>
        <select id="industry">
          <option value="">Select your industry</option>
          <option>Restaurant / food service</option>
          <option>Retail store</option>
          <option>Service business</option>
          <option>Freelance / consulting</option>
          <option>E-commerce</option>
          <option>Health / wellness</option>
          <option>Construction / trades</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field" style="margin-top:12px">
        <label>Biggest challenge right now (optional)</label>
        <textarea id="problem" placeholder="e.g. not enough customers, margins too thin..."></textarea>
      </div>
    </div>
    <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">Analyze my business →</button>
    <div id="error-box" class="error-box hidden"></div>
  </div>

  <div id="loading-section" class="hidden">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p style="color:var(--muted);font-size:14px">Analyzing your numbers...</p>
    </div>
  </div>

  <div id="results-section" class="hidden">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="result-card money">
      <div class="result-header"><div class="result-icon">💸</div><div class="result-title">Money leaks</div></div>
      <div class="result-body" id="result-money"></div>
    </div>
    <div class="result-card wins">
      <div class="result-header"><div class="result-icon">⚡</div><div class="result-title">Quick wins this week</div></div>
      <div class="result-body" id="result-wins"></div>
    </div>
    <div class="result-card plan">
      <div class="result-header"><div class="result-icon">📋</div><div class="result-title">30-day action plan</div></div>
      <div class="result-body" id="result-plan"></div>
    </div>
    <div class="result-card growth">
      <div class="result-header"><div class="result-icon">🚀</div><div class="result-title">Growth opportunity</div></div>
      <div class="result-body" id="result-growth"></div>
    </div>
    <div class="reset-wrap">
      <button class="reset-btn" onclick="resetForm()">← Analyze another business</button>
    </div>
  </div>
</div>

<script>
async function runAnalysis() {
  const revenue = document.getElementById('revenue').value.trim();
  const expenses = document.getElementById('expenses').value.trim();
  const leads = document.getElementById('leads').value.trim();
  const customers = document.getElementById('customers').value.trim();
  const industry = document.getElementById('industry').value;
  const problem = document.getElementById('problem').value.trim();
  const checks = Array.from(document.querySelectorAll('.expense-item input:checked')).map(c => c.value);

  if (!revenue || !expenses) { showError('Please enter your monthly revenue and expenses.'); return; }
  hideError();

  const rev = parseFloat(revenue);
  const exp = parseFloat(expenses);
  const profit = rev - exp;
  const margin = rev > 0 ? ((profit/rev)*100).toFixed(1) : 0;
  const convRate = (leads && customers && parseFloat(leads) > 0) ? ((parseFloat(customers)/parseFloat(leads))*100).toFixed(1) : null;

  document.getElementById('summary-bar').innerHTML = `
    <div class="stat"><div class="stat-value">$${profit.toLocaleString()}</div><div class="stat-label">Monthly profit</div></div>
    <div class="stat"><div class="stat-value">${margin}%</div><div class="stat-label">Profit margin</div></div>
    <div class="stat"><div class="stat-value">${convRate ? convRate+'%' : '—'}</div><div class="stat-label">Conversion rate</div></div>`;

  document.getElementById('form-section').classList.add('hidden');
  document.getElementById('loading-section').classList.remove('hidden');
  document.getElementById('analyze-btn').disabled = true;

  const prompt = `You are ProfitPilot, a sharp business advisor. Be direct, specific, use their exact numbers.

Business data:
- Industry: ${industry || 'small business'}
- Monthly revenue: $${rev.toLocaleString()}
- Monthly expenses: $${exp.toLocaleString()}
- Monthly profit: $${profit.toLocaleString()} (${margin}% margin)
- Leads: ${leads || 'unknown'}, Customers: ${customers || 'unknown'}${convRate ? ` (${convRate}% conversion)` : ''}
- Spending on: ${checks.length ? checks.join(', ') : 'not specified'}
- Biggest challenge: ${problem || 'not specified'}

Reply in exactly this format:

MONEY LEAKS:
[2-3 specific money leaks with dollar estimates]

QUICK WINS:
[3 numbered actions to take this week]

30-DAY PLAN:
[5 numbered prioritized actions]

GROWTH OPPORTUNITY:
[One specific untapped opportunity]`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'PASTE_YOUR_KEY_HERE',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
   const text = data.content ? data.content.map(b => b.text || '').join('') : (data.error ? data.error.message : 'No response');

    function extract(label, next) {
      const m = text.match(new RegExp(label + ':?\\s*([\\s\\S]*?)(?=' + next + ':|$)', 'i'));
      return m ? m[1].trim() : '';
    }

    document.getElementById('result-money').textContent = extract('MONEY LEAKS', 'QUICK WINS');
    document.getElementById('result-wins').textContent = extract('QUICK WINS', '30-DAY PLAN');
    document.getElementById('result-plan').textContent = extract('30-DAY PLAN', 'GROWTH OPPORTUNITY');
    document.getElementById('result-growth').textContent = extract('GROWTH OPPORTUNITY', 'ZZZNONE');

    document.getElementById('loading-section').classList.add('hidden');
    document.getElementById('results-section').classList.remove('hidden');
  } catch(err) {
    document.getElementById('loading-section').classList.add('hidden');
    document.getElementById('form-section').classList.remove('hidden');
    document.getElementById('analyze-btn').disabled = false;
    showError('Error: ' + err.message);
  }
}

function resetForm() {
  document.getElementById('results-section').classList.add('hidden');
  document.getElementById('form-section').classList.remove('hidden');
  document.getElementById('analyze-btn').disabled = false;
  hideError();
}
function showError(msg) { const b = document.getElementById('error-box'); b.textContent = msg; b.classList.remove('hidden'); }
function hideError() { document.getElementById('error-box').classList.add('hidden'); }
</script>
</body>
</html>
